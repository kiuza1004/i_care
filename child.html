<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a90e2">
  <title>아이 - 우리아이 위치찾기</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="back" href="./index.html?pick=1">←</a>
    <h2>아이</h2>
    <div class="topbar-right">
      <span class="version" id="appVersion"></span>
      <a class="settings" href="#" id="settingsBtn">⚙️</a>
    </div>
  </header>
  <main class="container">
    <section id="setupSection" class="card hidden">
      <h3>설정</h3>
      <p class="hint">Firebase Realtime Database URL을 입력하세요.<br>(부모와 동일한 URL)</p>
      <input type="text" id="dbUrlInput" placeholder="https://xxx-default-rtdb.firebaseio.com">
      <div class="row">
        <label>위치 요청</label>
        <select id="autoAcceptSelect">
          <option value="1">자동으로 보내기 (권장)</option>
          <option value="0">승낙 누른 뒤 보내기</option>
        </select>
      </div>
      <button class="btn btn-primary" id="saveDbUrl">저장</button>
      <button class="btn btn-secondary small-btn hidden" id="changeRoleBtn">역할 변경</button>
    </section>

    <section id="mainSection" class="hidden">
      <div id="idleCard" class="card status-card">
        <div class="status-icon">🟢</div>
        <div class="status-text">대기 중</div>
        <div class="status-sub">요청이 오면 여기에 표시돼요</div>
        <button class="btn btn-secondary small-btn" id="checkBtn">새로고침</button>
      </div>

      <div id="trackingCard" class="card status-card hidden">
        <div class="status-icon">📡</div>
        <div class="status-text">주기 추적 중</div>
        <div class="status-sub" id="trackingSub">위치를 보내는 중...</div>
        <p class="hint">이 화면을 닫지 말아주세요.<br>닫으면 추적이 멈춰요.</p>
        <button class="btn btn-secondary small-btn" id="trackingStopBtn">중지</button>
      </div>

      <div id="requestCard" class="card hidden">
        <div class="status-icon">📱</div>
        <h3>위치 요청이 왔어요</h3>
        <p class="hint" id="reqTime"></p>
        <div class="action-row">
          <button class="btn btn-deny" id="denyBtn">거절</button>
          <button class="btn btn-accept" id="acceptBtn">위치 보내기</button>
        </div>
      </div>

      <div id="sendingCard" class="card hidden">
        <div class="status-icon">📡</div>
        <div class="status-text">위치 확인 중...</div>
        <div class="status-sub">잠시만 기다려주세요</div>
      </div>

      <div id="doneCard" class="card hidden">
        <div class="status-icon">✅</div>
        <div class="status-text" id="doneText">위치를 보냈어요</div>
        <button class="btn btn-secondary small-btn" id="doneBtn">확인</button>
      </div>
    </section>
  </main>
  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/child.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
