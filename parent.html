<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a90e2">
  <title>부모 - 우리아이 위치찾기</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="back" href="./index.html?pick=1">←</a>
    <h2>부모</h2>
    <div class="topbar-right">
      <span class="version" id="appVersion"></span>
      <a class="settings" href="#" id="settingsBtn">⚙️</a>
    </div>
  </header>
  <main class="container">
    <section id="setupSection" class="card hidden">
      <h3>설정</h3>
      <p class="hint">Firebase Realtime Database URL을 입력하세요.<br>(README 참고)</p>
      <input type="text" id="dbUrlInput" placeholder="https://xxx-default-rtdb.firebaseio.com">
      <div class="row">
        <label>기본 지도</label>
        <select id="mapPrefSelect">
          <option value="google">구글지도</option>
          <option value="kakao">카카오맵</option>
          <option value="naver">네이버지도</option>
        </select>
      </div>
      <button class="btn btn-primary" id="saveDbUrl">저장</button>
      <button class="btn btn-secondary small-btn hidden" id="changeRoleBtn">역할 변경</button>
    </section>

    <section id="mainSection" class="hidden">
      <div class="card status-card">
        <div id="statusIcon" class="status-icon">📍</div>
        <div id="statusText" class="status-text">위치를 요청해보세요</div>
        <div id="statusSub" class="status-sub"></div>
      </div>

      <button class="btn btn-primary big-btn" id="requestBtn">위치 요청하기 (1회)</button>
      <button class="btn btn-secondary hidden" id="cancelBtn">취소</button>

      <div class="card" id="trackCard">
        <h3>🔄 주기 추적</h3>
        <div id="trackOffView">
          <div class="row">
            <label>간격</label>
            <select id="trackInterval"></select>
          </div>
          <div class="row">
            <label>지속</label>
            <select id="trackDuration"></select>
          </div>
          <button class="btn btn-primary" id="trackStartBtn">추적 시작</button>
          <p class="hint">아이 폰에서 앱이 켜져 있을 때만 동작합니다.<br>잠금화면 방지(Wake Lock)가 자동 적용됩니다.</p>
        </div>
        <div id="trackOnView" class="hidden">
          <div class="track-status">
            <div class="status-icon">📡</div>
            <div class="status-text" id="trackStatusText">추적 중</div>
            <div class="status-sub" id="trackStatusSub"></div>
          </div>
          <button class="btn btn-deny" id="trackStopBtn">추적 중지</button>
        </div>
      </div>

      <div id="resultCard" class="card hidden">
        <h3>📍 받은 위치</h3>
        <div class="map-preview">
          <iframe id="mapEmbed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <a id="primaryMapBtn" class="btn btn-primary big-btn" target="_blank" rel="noopener">지도 앱에서 열기</a>
        <div class="coords">
          <div>위도: <span id="lat">-</span></div>
          <div>경도: <span id="lng">-</span></div>
          <div>정확도: 약 <span id="acc">-</span>m</div>
          <div>받은 시각: <span id="ts">-</span></div>
        </div>
        <div class="map-links">
          <a id="kakaoLink" class="btn btn-map" target="_blank" rel="noopener">카카오맵</a>
          <a id="naverLink" class="btn btn-map" target="_blank" rel="noopener">네이버지도</a>
          <a id="googleLink" class="btn btn-map" target="_blank" rel="noopener">구글지도</a>
        </div>
      </div>
    </section>
  </main>
  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/parent.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
